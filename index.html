<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Something Special ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:radial-gradient(circle at center,#ff758c,#ff7eb3,#ff4d6d);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
    overflow:hidden;
}

.container{
    text-align:center;
    backdrop-filter: blur(12px);
    padding:40px 50px;
    border-radius:25px;
    background:rgba(255,255,255,0.12);
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
    animation:fadeIn 2s ease;
    max-width:600px;
    width:90%;
}

h1{
    font-size:38px;
    margin-bottom:15px;
    text-shadow:0 0 15px rgba(255,255,255,0.6);
}

h2{
    font-weight:300;
    margin-bottom:20px;
    font-size:22px;
}

.countdown{
    font-size:30px;
    font-weight:600;
    letter-spacing:2px;
}

.propose{
    margin-top:20px;
    font-size:18px;
    opacity:0.9;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(40px);} 
    to{opacity:1;transform:translateY(0);} 
}

/* Floating hearts */
.heart{
    position:absolute;
    color:#fff;
    font-size:20px;
    animation:float 6s linear infinite;
    opacity:0.8;
}

@keyframes float{
    from{transform:translateY(100vh) scale(0.5);} 
    to{transform:translateY(-10vh) scale(1.2);} 
}

/* ===== MOBILE FRIENDLY ===== */
@media (max-width:768px){

body{
    padding:15px;
    align-items:flex-start;
}

.container{
    padding:30px 20px;
    border-radius:20px;
}

h1{
    font-size:26px;
}

h2{
    font-size:18px;
}

.countdown{
    font-size:22px;
}

.propose{
    font-size:16px;
}

}

@media (max-width:420px){

h1{font-size:22px;}
h2{font-size:16px;}
.countdown{font-size:18px;}
.propose{font-size:14px;}

}
</style>
</head>
<body>

<div class="container">
    <h1>Something Special Coming ❤️</h1>
    <h2>Wait for 14th Feb... Stay Tuned ✨</h2>

    <div class="countdown" id="countdown"></div>

    <div class="propose">
        By the way... Happy Propose Day 💖<br>
        Itni jaldi nahi bataunga 🤭
    </div>
</div>

<script>
// Countdown to Feb 14
const target = new Date(new Date().getFullYear(),1,14);

function updateCountdown(){
    const now = new Date();
    const diff = target - now;

    if(diff<=0){
        document.getElementById('countdown').innerHTML = "It's Valentine's Day ❤️";
        return;
    }

    const d=Math.floor(diff/86400000);
    const h=Math.floor(diff%86400000/3600000);
    const m=Math.floor(diff%3600000/60000);
    const s=Math.floor(diff%60000/1000);

    document.getElementById('countdown').innerHTML=
        `${d}d ${h}h ${m}m ${s}s`;
}
setInterval(updateCountdown,1000);
updateCountdown();

// Floating hearts animation
setInterval(()=>{
    const heart=document.createElement('div');
    heart.className='heart';
    heart.innerHTML='❤️';
    heart.style.left=Math.random()*100+'vw';
    heart.style.fontSize=(12+Math.random()*30)+'px';
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),7000);
},400);
</script>

</body>
</html>
